services:
  nginx:
    image: nginx:latest
    container_name: swal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - planka

  planka:
    image: linuxserver/planka:latest
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Bogota
    env_file:
      - ./planka.env
    expose:
      - "1337"
    volumes:
      - planka-data:/data

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=planka
    volumes:
      - planka-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planka"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  planka-data:
  planka-db:
