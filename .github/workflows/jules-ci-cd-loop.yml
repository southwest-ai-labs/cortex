name: Jules Auto-Correction Loop

on:
  pull_request:
    branches: [ "master", "main" ]
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        override: true
        components: clippy, rustfmt

    - name: Check Formatting
      id: fmt
      run: cargo fmt -- --check
      continue-on-error: true

    - name: Run Cargo Check
      id: check
      run: cargo check
      continue-on-error: true

    - name: Run Tests
      id: test
      run: cargo test
      continue-on-error: true

    # TODO: Add cargo-ndk APK build steps here

    - name: Jules Auto-Feedback
      if: steps.fmt.outcome == 'failure' || steps.check.outcome == 'failure' || steps.test.outcome == 'failure'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Build failed. Assigning back to Jules."

        # If this is a PR (Jules usually works via PRs)
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          gh pr comment ${{ github.event.pull_request.number }} --body "@jules El build o los tests han fallado en el CI/CD. Por favor, revisa los logs de esta acción (cargo check/test) y corrige los errores de Rust."

          # Optional: add label back if Jules removed it, or add 'needs-attention'
          gh pr edit ${{ github.event.pull_request.number }} --add-label "jules"
        fi

        # Fail the workflow finally
        exit 1
